name: 'Cicaddy AI Agent'
description: 'Run AI agent tasks in GitHub Actions using cicaddy'
branding:
  icon: 'cpu'
  color: 'blue'

inputs:
  ai_provider:
    description: 'AI provider: gemini, openai, claude'
    required: true
  ai_model:
    description: 'Model identifier'
    required: true
  ai_api_key:
    description: 'AI provider API key'
    required: true
  task_file:
    description: 'Path to DSPy YAML task file'
    required: false
  task_prompt:
    description: 'Inline task prompt (alternative to task-file)'
    required: false
  report_template:
    description: 'Path to custom HTML report template'
    required: false
  mcp_servers_config:
    description: 'JSON array of MCP server configs (optional, for future use)'
    required: false
    default: '[]'
  slack_webhook_url:
    description: 'Slack webhook URL for notifications'
    required: false
  post_pr_comment:
    description: 'Post analysis results as PR comment (requires github-token with pull-requests: write)'
    required: false
    default: 'false'
  submit_review:
    description: 'Submit a formal PR review with APPROVE or REQUEST_CHANGES based on AI analysis (requires github-token with pull-requests: write)'
    required: false
    default: 'false'
  github_token:
    description: 'GitHub token for API access'
    required: false
    default: ${{ github.token }}

outputs:
  report_html:
    description: 'Path to generated HTML report'
  report_json:
    description: 'Path to JSON analysis result'
  summary:
    description: 'Brief text summary'

runs:
  using: 'docker'
  image: 'Dockerfile'
  # After first GHCR publish, switch to pre-built image for faster startup:
  # image: 'docker://ghcr.io/redhat-community-ai-tools/cicaddy-action:0.1.0'
