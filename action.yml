name: 'Cicaddy AI Agent'
description: 'Run AI agent tasks in GitHub Actions using cicaddy'
branding:
  icon: 'cpu'
  color: 'blue'

inputs:
  ai_provider:
    description: 'AI provider: gemini, openai, claude, anthropic-vertex, gemini-vertex'
    required: true
  ai_model:
    description: 'Model identifier'
    required: true
  ai_api_key:
    description: 'AI provider API key (not required for anthropic-vertex or gemini-vertex, which use GCP ADC)'
    required: false
  vertex_project_id:
    description: 'GCP project ID for Vertex AI Claude (falls back to google_cloud_project if not set)'
    required: false
  cloud_ml_region:
    description: 'DEPRECATED: Use google_cloud_location instead. Vertex AI region for anthropic-vertex.'
    required: false
  google_cloud_project:
    description: 'GCP project ID for Vertex AI (required for gemini-vertex, optional fallback for anthropic-vertex)'
    required: false
  google_cloud_location:
    description: 'Vertex AI location (default: global)'
    required: false
  task_file:
    description: 'Path to DSPy YAML task file'
    required: false
  task_prompt:
    description: 'Inline task prompt (alternative to task_file)'
    required: false
  report_template:
    description: 'Path to custom HTML report template'
    required: false
  mcp_servers_config:
    description: 'JSON array of MCP server configs (optional, for future use)'
    required: false
    default: '[]'
  slack_webhook_url:
    description: 'Slack webhook URL for notifications'
    required: false
  post_pr_comment:
    description: 'Post analysis results as PR comment (requires github-token with pull-requests: write)'
    required: false
    default: 'false'
  submit_review:
    description: 'Submit a formal PR review with APPROVE or REQUEST_CHANGES based on AI analysis (requires github-token with pull-requests: write)'
    required: false
    default: 'false'
  run_govulncheck:
    description: 'Run govulncheck for vulnerability reachability analysis (requires Go and govulncheck installed)'
    required: false
    default: 'false'
  dep_review_severity_threshold:
    description: 'Minimum semver bump to analyze for dep review: minor or major'
    required: false
    default: 'minor'
  delegation_mode:
    description: 'Enable AI-powered sub-agent delegation: none (default) or auto'
    required: false
    default: 'none'
  max_sub_agents:
    description: 'Maximum concurrent sub-agents for delegation (1-10, default: 3)'
    required: false
    default: '3'
  github_token:
    description: 'GitHub token for API access'
    required: false
    default: ${{ github.token }}

outputs:
  report_html:
    description: 'Path to generated HTML report'
  report_json:
    description: 'Path to JSON analysis result'
  summary:
    description: 'Brief text summary'

runs:
  using: 'docker'
  image: 'Dockerfile'
  # After first GHCR publish, switch to pre-built image for faster startup:
  # image: 'docker://ghcr.io/redhat-community-ai-tools/cicaddy-action:0.7.0'
