name: pr_code_review
description: "AI code review on pull request changes with current library documentation"
type: code_review
version: "1.0"

inputs:
  - name: pr_title
    description: "Pull request title"
    required: true
  - name: pr_description
    description: "Pull request description"
    required: false
  - name: pr_author
    description: "Author of the pull request"
    required: false
  - name: target_branch
    description: "Target branch for the merge"
    required: false
  - name: source_branch
    description: "Source branch being merged"
    required: false
  - name: diff_content
    description: "The code diff to review"
    required: true
    format: diff
  - name: review_focus
    env_var: ANALYSIS_FOCUS
    default: "general"
    description: "Focus area (security, performance, maintainability, general)"
    required: false

outputs:
  - name: summary
    description: "Brief summary of changes and overall assessment"
    required: true
    format: paragraph
  - name: issues
    description: "Identified issues, bugs, or concerns"
    required: true
    format: list
  - name: security_concerns
    description: "Security vulnerabilities or risks"
    required: false
    format: list
  - name: recommendations
    description: "Actionable recommendations for improvement"
    required: true
    format: list
  - name: code_quality
    description: "Code quality, readability, and maintainability assessment"
    required: false
    format: paragraph
  - name: review_decision
    description: "Review decision: APPROVE, REQUEST_CHANGES, or COMMENT"
    required: true
    format: value
    allowed_values: ["APPROVE", "REQUEST_CHANGES", "COMMENT"]

tools:
  servers: []
  required_tools: []
  forbidden_tools: []

constraints:
  - Focus on actionable feedback that improves code quality
  - Prioritize issues by severity (Critical > High > Medium > Low)
  - Provide specific line references when identifying issues
  - Suggest concrete fixes, not just identify problems
  - Consider the context and purpose of the changes
  - Avoid nitpicking style issues unless they impact readability
  - Be constructive and respectful in feedback
  - Check for common security vulnerabilities (injection, auth, data exposure)
  - Verify error handling and edge cases
  - Assess test coverage implications
  - When reviewing code that uses external libraries, use Context7 tools to look up
    current API documentation and best practices
  - All fenced code blocks (```) must start at column 0 with no leading whitespace,
    even when inside list items. Content inside code blocks must not have extra
    indentation from list nesting
  - Set review_decision based on findings:
    * APPROVE - No significant issues found, changes are good to merge
    * REQUEST_CHANGES - Critical or high severity issues that must be fixed before merge
    * COMMENT - Provide feedback without blocking merge (suggestions, minor issues)

reasoning: chain_of_thought
output_format: markdown

context: |
  You are reviewing a pull request. Your goal is to:
  1. Understand the purpose and scope of the changes
  2. Identify bugs, security issues, and potential problems
  3. When code uses external libraries/frameworks, use the Context7 MCP tools
     (resolve-library-id -> get-library-docs) to verify the code follows
     current API patterns and best practices
  4. Suggest improvements for code quality and maintainability
  5. Provide actionable, specific feedback

  If Context7 tools are available, use them to look up library docs.
  If Context7 is unavailable or fails, proceed with the review using
  your own knowledge — do NOT fail the analysis.

  The review should be thorough but respectful, focusing on helping the
  author improve their code rather than criticizing.
