name: AI PR Review

on:
  pull_request_target:
    types: [opened, synchronize, labeled]

permissions:
  contents: read
  pull-requests: write

jobs:
  remove-label-on-push:
    if: >-
      github.event.action == 'synchronize' &&
      github.event.pull_request.head.repo.full_name != github.repository &&
      contains(github.event.pull_request.labels.*.name, 'safe-to-review')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Remove safe-to-review label on new push from fork
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr edit "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --remove-label "safe-to-review"

  review:
    if: >-
      github.actor != 'dependabot[bot]' &&
      (
        (github.event.pull_request.head.repo.full_name == github.repository && github.event.action != 'labeled') ||
        (github.event.action == 'labeled' && github.event.label.name == 'safe-to-review')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build MCP config
        id: mcp
        env:
          CONTEXT7_KEY: ${{ secrets.CONTEXT7_API_KEY }}
        run: |
          # Context7 is optional — only include if secret is configured
          if [ -n "${CONTEXT7_KEY}" ]; then
            echo "config=[{\"name\":\"Context7\",\"protocol\":\"http\",\"endpoint\":\"https://mcp.context7.com/mcp\",\"headers\":{\"CONTEXT7_API_KEY\":\"${CONTEXT7_KEY}\"},\"timeout\":300,\"idle_timeout\":60}]" >> "$GITHUB_OUTPUT"
          else
            echo 'config=[]' >> "$GITHUB_OUTPUT"
          fi

      - name: AI Code Review
        uses: redhat-community-ai-tools/cicaddy-action@v0.5.0
        id: review
        with:
          ai_provider: gemini
          ai_model: gemini-3-flash-preview
          ai_api_key: ${{ secrets.AI_API_KEY }}
          task_file: tasks/pr_review.yml
          post_pr_comment: 'true'
          delegation_mode: auto
          mcp_servers_config: ${{ steps.mcp.outputs.config }}
        env:
          ANALYSIS_FOCUS: "general"
          GIT_DIFF_CONTEXT_LINES: "15"
