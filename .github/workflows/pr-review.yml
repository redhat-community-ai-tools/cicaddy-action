name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build MCP config
        id: mcp
        run: |
          # Context7 is optional — only include if secret is configured
          if [ -n "${{ secrets.CONTEXT7_API_KEY }}" ]; then
            echo 'config=[{"name":"Context7","protocol":"http","endpoint":"https://mcp.context7.com/mcp","headers":{"CONTEXT7_API_KEY":"${{ secrets.CONTEXT7_API_KEY }}"},"timeout":300,"idle_timeout":60}]' >> "$GITHUB_OUTPUT"
          else
            echo 'config=[]' >> "$GITHUB_OUTPUT"
          fi

      - name: AI Code Review
        uses: ./
        id: review
        with:
          ai-provider: gemini
          ai-model: gemini-3-flash-preview
          ai-api-key: ${{ secrets.AI_API_KEY }}
          task-file: tasks/pr_review.yml
          post-pr-comment: 'true'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          mcp-servers-config: ${{ steps.mcp.outputs.config }}
        env:
          ANALYSIS_FOCUS: "general"
          GIT_DIFF_CONTEXT_LINES: "15"
